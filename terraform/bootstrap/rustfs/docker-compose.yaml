services:
  rustfs_perms:
    image: alpine
    user: root
    volumes:
      - /mnt/user/appdata/rustfs/data:/fix_path
    command: chown -R 10001:10001 /fix_path
  rustfs:
    image: rustfs/rustfs:1.0.0-alpha.98
    container_name: rustfs
    restart: unless-stopped
    ports:
      - 9000:9000
      - 9002:9001
    volumes:
      - /mnt/user/appdata/rustfs/data:/data
      - /mnt/user/appdata/rustfs/logs:/logs
    depends_on:
      rustfs_perms:
        condition: service_completed_successfully
