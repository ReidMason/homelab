apiVersion: v1
kind: Service
metadata:
  name: portainer-agent
spec:
  selector:
    app: portainer-agent
  ports:
    - name: http
      protocol: TCP
      port: 9001
      targetPort: 9001
---
apiVersion: v1
kind: Service
metadata:
  name: portainer-agent-headless
spec:
  clusterIP: None
  selector:
    app: portainer-agent
