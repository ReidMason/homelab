apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflare-ddns
  labels:
    app: cloudflare-ddns
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudflare-ddns
  template:
    metadata:
      labels:
        app: cloudflare-ddns
    spec:
      containers:
        - name: cloudflare-ddns
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          env:
            - name: CLOUDFLARE_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.homelab.externalSecret.name }}
                  key: {{ .Values.homelab.externalSecret.secretKey }}
            - name: DOMAINS
              value: {{ .Values.homelab.domains | quote }}
            - name: PROXIED
              value: {{ .Values.homelab.proxied | quote }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            runAsUser: 1000
            runAsGroup: 1000
            capabilities:
              drop:
                - ALL
