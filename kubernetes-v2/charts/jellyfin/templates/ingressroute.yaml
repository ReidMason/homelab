{{- if and .Values.homelab.ingressRoute.enabled .Values.homelab.ingressRoute.host }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: jellyfin
spec:
  entryPoints:
{{- range .Values.homelab.ingressRoute.entryPoints }}
    - {{ . }}
{{- end }}
  routes:
    - match: Host(`{{ .Values.homelab.ingressRoute.host }}`)
      kind: Rule
      services:
        - name: jellyfin
          port: {{ .Values.homelab.ingressRoute.servicePort }}
{{- end }}
