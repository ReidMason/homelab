{{- if .Values.homelab.abyss.enabled }}
{{- $initContainers := include "homelab.abyss.initContainers" . | fromYamlArray }}
{{- $_ := set .Values.jellyfin "extraInitContainers" (concat (.Values.jellyfin.extraInitContainers | default list) $initContainers) }}
{{- $abyssVolumes := include "homelab.abyss.volumes" . | fromYamlArray }}
{{- $_ := set .Values.jellyfin "volumes" (concat (.Values.jellyfin.volumes | default list) $abyssVolumes) }}
{{- $abyssVolumeMounts := include "homelab.abyss.volumeMounts" . | fromYamlArray }}
{{- $_ := set .Values.jellyfin "volumeMounts" (concat (.Values.jellyfin.volumeMounts | default list) $abyssVolumeMounts) }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "homelab.jellyfin.fullname" . }}-abyss-branding
  labels:
    app.kubernetes.io/name: jellyfin
    app.kubernetes.io/component: abyss
data:
  branding.xml: |
{{ include "homelab.abyss.brandingXml" . | nindent 4 }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "homelab.jellyfin.fullname" . }}-abyss-spotlight
  labels:
    app.kubernetes.io/name: jellyfin
    app.kubernetes.io/component: abyss
data:
  apply-spotlight.sh: |
    #!/bin/sh
    set -eu

    RAW="https://raw.githubusercontent.com/${ABYSS_REPO}/${ABYSS_BRANCH}"
    STAGE="/tmp/abyss-stage"

    mkdir -p "${STAGE}" "${WEB_DIR}/ui"

    for file in \
      scripts/spotlight/spotlight.html \
      scripts/spotlight/spotlight.css \
      scripts/spotlight/home-html.chunk.js
    do
      curl -fsSL "${RAW}/${file}" -o "${STAGE}/$(basename "${file}")"
    done

    for f in spotlight.html spotlight.css; do
      src="${STAGE}/${f}"
      dest="${WEB_DIR}/ui/${f}"
      if ! cmp -s "${src}" "${dest}" 2>/dev/null; then
        cp -f "${src}" "${dest}"
      fi
    done

    CHUNK_FILE=$(find "${WEB_DIR}" -maxdepth 1 -name "home-html.*.chunk.js" | head -1)
    if [ -z "${CHUNK_FILE}" ]; then
      echo "abyss: home-html chunk not found, skipping patch"
      exit 0
    fi

    if grep -q "abyss-spotlight-frame\|featurediframe" "${CHUNK_FILE}" 2>/dev/null; then
      exit 0
    fi

    cp -f "${CHUNK_FILE}" "${CHUNK_FILE}.bak"
    cp -f "${STAGE}/home-html.chunk.js" "${CHUNK_FILE}"
{{- end }}
