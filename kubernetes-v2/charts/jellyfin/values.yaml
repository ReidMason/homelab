jellyfin:
  ingress:
    enabled: false
  persistence:
    config:
      enabled: true
      size: 20Gi
      storageClass: ""
    media:
      enabled: false
  service:
    type: ClusterIP

homelab:
  ingressRoute:
    enabled: false
    host: ""
    entryPoints:
      - websecure
    servicePort: 8096
  abyss:
    enabled: false
    repo: AumGupta/abyss-jellyfin
    branch: main
    customCss: |
      @import url('https://cdn.jsdelivr.net/gh/AumGupta/abyss-jellyfin@main/abyss.css');
