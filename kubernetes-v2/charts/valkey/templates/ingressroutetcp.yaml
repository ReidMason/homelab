{{- if and .Values.homelab.ingressRouteTcp.enabled .Values.homelab.ingressRouteTcp.host .Values.homelab.ingressRouteTcp.tlsSecretName }}
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: valkey
spec:
  entryPoints:
{{- range .Values.homelab.ingressRouteTcp.entryPoints }}
    - {{ . }}
{{- end }}
  routes:
    - match: HostSNI(`{{ .Values.homelab.ingressRouteTcp.host }}`)
      services:
        - name: valkey
          port: {{ .Values.homelab.ingressRouteTcp.servicePort }}
  tls:
    secretName: {{ .Values.homelab.ingressRouteTcp.tlsSecretName }}
{{- end }}
