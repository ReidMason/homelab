apiVersion: v1
kind: Service
metadata:
  name: radarr
spec:
  selector:
    app: radarr
  ports:
    - name: http
      protocol: TCP
      port: 7878
      targetPort: 7878
{{- if .Values.homelab.lanService.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: radarr-lan
  {{- if .Values.homelab.lanService.metallbAddressPool }}
  annotations:
    metallb.io/address-pool: {{ .Values.homelab.lanService.metallbAddressPool | quote }}
  {{- end }}
spec:
  type: {{ .Values.homelab.lanService.type }}
  {{- if .Values.homelab.lanService.loadBalancerIP }}
  loadBalancerIP: {{ .Values.homelab.lanService.loadBalancerIP | quote }}
  {{- end }}
  selector:
    app: radarr
  ports:
    - name: http
      protocol: TCP
      port: 7878
      targetPort: 7878
{{- end }}
