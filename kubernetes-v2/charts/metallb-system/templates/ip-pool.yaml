{{- if .Values.ipPool.addresses }}
apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: "default-pool"
  namespace: {{ .Release.Namespace }}
spec:
  addresses:
    {{- range .Values.ipPool.addresses }}
    - {{ . }}
    {{- end }}
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: "default-l2"
  namespace: {{ .Release.Namespace }}
spec:
  ipAddressPools:
    - "default-pool"
{{- end }}