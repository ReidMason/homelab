{{- if .Values.homelab.clusterSecretStore.enabled }}
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: {{ .Values.homelab.clusterSecretStore.name | quote }}
spec:
  provider:
    vault:
      server: {{ required "homelab.vault.server is required when clusterSecretStore is enabled" .Values.homelab.vault.server | quote }}
      path: {{ .Values.homelab.vault.path | quote }}
      version: {{ .Values.homelab.vault.version | quote }}
      {{- $ca := .Values.homelab.vault.caBundle | default "" | trim }}
      {{- if $ca }}
      caBundle: {{ $ca | b64enc }}
      {{- end }}
      auth:
        appRole:
          path: {{ .Values.homelab.vault.auth.mountPath | quote }}
          roleRef:
            name: {{ .Values.homelab.vault.authSecretName | quote }}
            namespace: {{ .Release.Namespace | quote }}
            key: role-id
          secretRef:
            name: {{ .Values.homelab.vault.authSecretName | quote }}
            namespace: {{ .Release.Namespace | quote }}
            key: secret-id
{{- end }}
