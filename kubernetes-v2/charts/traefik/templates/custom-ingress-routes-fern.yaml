{{- if .Values.homelab.customIngressRoutes.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: fern
  namespace: {{ .Release.Namespace }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`fern.skippythesnake.com`)
      kind: Rule
      services:
        - name: fern-server
          port: 80
    - match: Host(`scrutiny.skippythesnake.com`)
      kind: Rule
      services:
        - name: fern-server
          port: 8083
    - match: Host(`backrest.skippythesnake.com`)
      kind: Rule
      services:
        - name: fern-server
          port: 9898
    - match: Host(`vault.skippythesnake.com`)
      kind: Rule
      services:
        - name: fern-server
          port: 8200
---
apiVersion: v1
kind: Service
metadata:
  name: fern-server
  namespace: {{ .Release.Namespace }}
spec:
  type: ExternalName
  externalName: fern.internal
{{- end }}
