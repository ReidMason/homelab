{{- if .Values.homelab.customIngressRoutes.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: ivy
  namespace: {{ .Release.Namespace }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`ivy.skippythesnake.com`)
      kind: Rule
      services:
        - name: ivy-service
          port: 8006
          scheme: https
---
apiVersion: v1
kind: Service
metadata:
  name: ivy-service
  namespace: {{ .Release.Namespace }}
spec:
  type: ExternalName
  externalName: ivy.internal
{{- end }}
