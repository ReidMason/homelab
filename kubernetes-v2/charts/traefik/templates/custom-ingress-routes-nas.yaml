{{- if .Values.homelab.customIngressRoutes.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: nas
  namespace: {{ .Release.Namespace }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`nas.skippythesnake.com`)
      kind: Rule
      services:
        - name: nas-server
          port: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: nas-server
  namespace: {{ .Release.Namespace }}
spec:
  type: ExternalName
  externalName: nas.internal
{{- end }}
