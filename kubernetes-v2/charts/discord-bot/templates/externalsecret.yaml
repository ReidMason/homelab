{{- if and .Values.homelab.externalSecret.enabled .Values.homelab.externalSecret.remoteKey }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.homelab.externalSecret.name | quote }}
spec:
  refreshInterval: {{ .Values.homelab.externalSecret.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.homelab.externalSecret.clusterSecretStoreName | quote }}
    kind: ClusterSecretStore
  target:
    name: {{ .Values.homelab.externalSecret.name | quote }}
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: {{ .Values.homelab.externalSecret.secretKey | quote }}
      remoteRef:
        key: {{ .Values.homelab.externalSecret.remoteKey | quote }}
        property: {{ .Values.homelab.externalSecret.property | quote }}
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None
        nullBytePolicy: Ignore
{{- end }}
