external-secrets:
  installCRDs: true
  bitwarden-sdk-server:
    enabled: false

homelab:
  clusterSecretStore:
    enabled: true
    name: vault-homelab
  vault:
    server: http://fern.internal:8200
    path: secret
    version: v2
    auth:
      mountPath: approle
    authSecretName: vault-approle-eso
    caBundle: ""
  vaultAppRoleSealedSecret:
    enabled: false
    encryptedData: {}
