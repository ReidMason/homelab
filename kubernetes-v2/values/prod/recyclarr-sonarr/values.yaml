schedule: "@daily"

homelab:
  externalSecret:
    enabled: true
    name: recyclarr-sonarr-api-key
    clusterSecretStoreName: vault-homelab
    remoteKey: secret/prod/sonarr
    property: api_key
    secretKey: api-key

config: |
  sonarr:
    sonarr:
      base_url: http://sonarr.sonarr.svc.cluster.local:8989
      api_key: !env_var SONARR_API_KEY

      quality_profiles:
        - trash_id: 72dae194fc92bf828f32cde7744e51a1 # WEB-1080p
          reset_unmatched_scores:
            enabled: true
          upgrade:
            allowed: false
        - trash_id: d1498e7d189fbe6c7110ceaabb7473e6 # WEB-2160p
          reset_unmatched_scores:
            enabled: true
          upgrade:
            allowed: false
        - trash_id: 20e0fc959f1f1704bed501f23bdae76f # [Anime] Remux-1080p
          reset_unmatched_scores:
            enabled: true
          upgrade:
            allowed: false
          qualities:
            - name: Bluray-2160p
              qualities:
                - Bluray-2160p Remux
                - Bluray-2160p
            - name: WEB 2160p
              qualities:
                - WEBDL-2160p
                - WEBRip-2160p
                - HDTV-2160p
            - name: Bluray-1080p
              qualities:
                - Bluray-1080p Remux
                - Bluray-1080p
            - name: WEB 1080p
              qualities:
                - WEBDL-1080p
                - WEBRip-1080p
                - HDTV-1080p
            - name: Bluray-720p
            - name: WEB 720p
              qualities:
                - WEBDL-720p
                - WEBRip-720p
                - HDTV-720p
            - name: Bluray-480p
            - name: DVD
            - name: SDTV

      custom_formats:
        - trash_ids:
            - 418f50b10f1907201b6cfdf881f467b7 # Anime Dual Audio
          assign_scores_to:
            - trash_id: 20e0fc959f1f1704bed501f23bdae76f # [Anime] Remux-1080p
              score: 2000
        - trash_ids:
            - 026d5aadd1a6b4e550b134cb6c72b3ca # Uncensored
          assign_scores_to:
            - trash_id: 20e0fc959f1f1704bed501f23bdae76f # [Anime] Remux-1080p
              score: 101
