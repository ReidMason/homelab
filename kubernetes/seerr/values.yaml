# Seerr Helm chart: https://github.com/seerr-team/seerr/tree/develop/charts/seerr-chart
# Ingress: Traefik via kubernetes/seerr/ingress.yaml (this repo is GitOps, not the chart)
# Data volume: NFS PV/PVC in seerr-pv-pvc.yaml (fern.lan, same pattern as other apps)
fullnameOverride: seerr
ingress:
  enabled: false
config:
  persistence:
    # Chart skips creating a PVC; see seerr-pv-pvc.yaml
    existingClaim: seerr-pvc
