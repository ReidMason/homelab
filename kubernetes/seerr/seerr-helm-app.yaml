apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: seerr-helm
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: homelab
  sources:
    - chart: seerr-chart
      repoURL: ghcr.io/seerr-team/seerr
      # Pin; bump with chart releases: helm show chart oci://ghcr.io/seerr-team/seerr/seerr-chart
      targetRevision: "3.5.1"
      helm:
        releaseName: seerr
        valueFiles:
          - $values/kubernetes/seerr/values.yaml
    - ref: values
      repoURL: https://github.com/ReidMason/homelab.git
      targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: seerr
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
