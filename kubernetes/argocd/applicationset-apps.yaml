apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: homelab-apps
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/ReidMason/homelab.git
        revision: main
        directories:
          - path: kubernetes/*
          - path: kubernetes/argocd
            exclude: true
  template:
    metadata:
      name: "{{path.basename}}"
    spec:
      project: homelab
      source:
        repoURL: https://github.com/ReidMason/homelab.git
        targetRevision: main
        path: "{{path}}"
      destination:
        server: https://kubernetes.default.svc
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
